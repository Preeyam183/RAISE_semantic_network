<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Network Viz</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"></script>
    <style>
        :root { --c-pos: #97C459; --c-neg: #F09595; --c-neu: #EF9F27; }
        body { background: #111; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        #gw { width: 100vw; height: 100vh; background: #111; position: relative; }
        .glink { stroke: #444; stroke-opacity: 0.4; }
        .nd circle { cursor: grab; stroke: #222; stroke-width: 1.5px; }
        .nd text { fill: #ccc; font-size: 12px; pointer-events: none; text-anchor: middle; }
        #gctrls { position: absolute; top: 10px; right: 10px; z-index: 10; }
        .fbtn { background: #333; color: white; border: 1px solid #555; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="gctrls">
        <button class="fbtn" onclick="sim.alpha(1).restart()">Wake Up Physics</button>
    </div>
    <div id="gw"><svg id="gsvg"></svg></div>

    <script>
        const NODES = [
            {id:"innovation",label:"Innovation",freq:2100,s:"positive"},
            {id:"chatbots",label:"Chatbots",freq:1920,s:"positive"},
            {id:"job-loss",label:"Job Loss",freq:1850,s:"negative"},
            {id:"regulation",label:"Regulation",freq:1680,s:"neutral"}
        ];
        const LINKS = [
            {source:"innovation",target:"chatbots",w:800},
            {source:"job-loss",target:"regulation",w:500}
        ];

        const W = window.innerWidth, H = window.innerHeight;
        const svg = d3.select("#gsvg").attr("width", W).attr("height", H);
        const g = svg.append("g");

        const sim = d3.forceSimulation(NODES)
            .force("link", d3.forceLink(LINKS).id(d => d.id).distance(150))
            .force("charge", d3.forceManyBody().strength(-300))
            .force("center", d3.forceCenter(W / 2, H / 2));

        const lnk = g.selectAll("line").data(LINKS).enter().append("line").attr("class", "glink");
        
        const nd = g.selectAll(".nd").data(NODES).enter().append("g").attr("class", "nd")
            .call(d3.drag()
                .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
                .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

        nd.append("circle").attr("r", 20).attr("fill", d => d.s === "positive" ? "var(--c-pos)" : "var(--c-neg)");
        nd.append("text").attr("dy", 30).text(d => d.label);

        sim.on("tick", () => {
            lnk.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
               .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
            nd.attr("transform", d => `translate(${d.x},${d.y})`);
        });
    </script>
</body>
</html>
